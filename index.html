<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLCC Display Layar 1</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden; 
        }

        /* === STYLE KONTEN UTAMA === */
        .fullscreen-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 10;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        /* Trik memotong area hitam atas-bawah bawaan YouTube agar terlihat benar-benar bersih */
        .video-wrapper iframe {
            position: absolute;
            top: -60px;
            left: 0;
            width: 100%;
            height: calc(100% + 120px);
        }
        .hidden {
            display: none !important;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- === KONTEN UTAMA === -->
<div id="mainContent" class="fullscreen-container">
    <div id="playerWrapper" class="video-wrapper">
        <div id="player1"></div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    const SUPABASE_URL = "https://zrycfquuqcygftngkwku.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_D7uzajVgAFW_8EC5hQp57g_IBiyAHYO"; 
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let player1;
    let currentVideoId1 = 'bRNlrdfKNd4'; 

    window.onload = function() {
        initializeApplication();
    };

    async function initializeApplication() {
        try {
            const res1 = await supabaseClient
                .from('video_settings')
                .select('video_id')
                .eq('id', 1)
                .maybeSingle();

            if (res1.data && res1.data.video_id && res1.data.video_id !== 'contoh') {
                currentVideoId1 = res1.data.video_id;
            }

        } catch (err) {
            console.log("Membaca konfigurasi sinkronisasi cloud terhambat:", err);
        } finally {
            if (typeof YT !== 'undefined' && YT.loaded) {
                onYouTubeIframeAPIReady();
            }
        }

        supabaseClient
            .channel('schema-db-changes')
            .on(
                'postgres_changes',
                { event: '*', schema: 'public', table: 'video_settings' },
                (payload) => {
                    if (payload.new && payload.new.id === 1) {
                        currentVideoId1 = payload.new.video_id;
                        setupSinglePlayer(currentVideoId1);
                    }
                }
            )
            .subscribe();
    }

    function onYouTubeIframeAPIReady() {
        setupSinglePlayer(currentVideoId1);
    }

    // Fungsi pembantu khusus mematikan CC/Subtitle secara paksa
    function forceDisableCC(targetPlayer) {
        if (!targetPlayer) return;
        try {
            if (typeof targetPlayer.unloadModule === 'function') {
                targetPlayer.unloadModule('captions');
            }
            if (typeof targetPlayer.setOption === 'function') {
                targetPlayer.setOption('captions', 'track', {});
            }
        } catch(e) {
            console.log("CC Unload skip:", e);
        }
    }

    // FUNGSI BARU: Memaksa kualitas video ke 1080p dengan sistem retries berkala
    function force1080pQuality(targetPlayer) {
        if (!targetPlayer) return;
        try {
            if (typeof targetPlayer.setPlaybackQuality === 'function') {
                targetPlayer.setPlaybackQuality('hd1080');
            }
            // Beberapa tipe browser membutuhkan pembaharuan opsi internal agar setelan mengunci
            if (typeof targetPlayer.setOption === 'function') {
                targetPlayer.setOption('playbackQuality', 'hd1080');
                targetPlayer.setOption('vq', 'hd1080');
            }
        } catch(e) {
            console.log("Gagal set kualitas:", e);
        }
    }

    function setupSinglePlayer(videoId) {
        if (!videoId) return;

        if (player1 && typeof player1.loadVideoById === 'function') {
            player1.loadVideoById({
                videoId: videoId,
                startSeconds: 0,
                suggestedQuality: 'hd1080'
            });
            
            // Retries berkala sesaat setelah pergantian video sukses diproses
            let retryCount = 0;
            const qualityInterval = setInterval(() => {
                force1080pQuality(player1);
                forceDisableCC(player1);
                retryCount++;
                if (retryCount > 6) clearInterval(qualityInterval); // Coba paksa selama 3 detik awal
            }, 500);

            setTimeout(() => {
                player1.mute();
                player1.playVideo();
            }, 500);
        } else {
            player1 = new YT.Player('player1', {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'loop': 1,
                    'playlist': videoId,
                    'mute': 1,          
                    'controls': 1,      
                    'rel': 0,
                    'modestbranding': 1,
                    'fs': 1,            
                    'iv_load_policy': 3,
                    'vq': 'hd1080',      /* Parameter dasar untuk mengunci kualitas HD 1080p */
                    'cc_load_policy': 0, 
                    'cc_lang_pref': 'none'
                },
                events: {
                    'onReady': (event) => {
                        event.target.mute();
                        event.target.playVideo();
                        
                        // Eksekusi paksa kualitas & matikan CC secara simultan ketika player siap
                        let retryCount = 0;
                        const readyInterval = setInterval(() => {
                            force1080pQuality(event.target);
                            forceDisableCC(event.target);
                            retryCount++;
                            if (retryCount > 6) clearInterval(readyInterval);
                        }, 500);

                        setTimeout(() => {
                            if (event.target.getPlayerState() !== 1) event.target.playVideo();
                        }, 1000);
                    },
                    'onStateChange': (event) => {
                        // Jalankan ulang pengunci kualitas setiap status video berubah ke "PLAYING"
                        if (event.data === YT.PlayerState.PLAYING) {
                            force1080pQuality(event.target);
                            forceDisableCC(event.target);
                        }
                        if (event.data === YT.PlayerState.ENDED) {
                            event.target.playVideo();
                        }
                    }
                }
            });
        }
    }
</script>

</body>
</html>
