<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemutar Video 1 - Monitor Fullscreen</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden; 
        }
        
        /* === STYLE GERBANG PASSWORD === */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .auth-box {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #333;
            max-width: 400px;
            width: 85%;
        }
        .auth-box h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 20px;
            color: #fff;
        }
        .auth-box input[type="password"] {
            width: 90%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #414141;
            background-color: #222;
            color: #fff;
            border-radius: 4px;
            font-size: 16px;
            text-align: center;
        }
        .auth-box input[type="password"]:focus {
            outline: 1px solid #ff0000;
        }
        .auth-box button {
            width: 100%;
            padding: 12px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .auth-box button:hover {
            background-color: #cc0000;
        }

        /* === STYLE KONTEN UTAMA FULLSCREEN === */
        .fullscreen-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 10;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        /* Trik memotong area hitam atas-bawah bawaan YouTube agar terlihat benar-benar bersih */
        .video-wrapper iframe {
            position: absolute;
            top: -60px;
            left: 0;
            width: 100%;
            height: calc(100% + 120px);
        }
        .hidden {
            display: none !important;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- === LAYER PROTEKSI PASSWORD === -->
<div id="authOverlay" class="auth-overlay">
    <div class="auth-box">
        <h2>Akses Monitor Video 1</h2>
        <input type="password" id="pagePassword" placeholder="Masukkan Password..." onkeydown="checkEnterKey(event)">
        <button onclick="verifyPassword()">Masuk</button>
    </div>
</div>

<!-- === KONTEN UTAMA (LANGSUNG LAYAR PENUH) === -->
<div id="mainContent" class="fullscreen-container hidden">
    <div id="playerWrapper" class="video-wrapper">
        <div id="player1"></div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    // Menghubungkan ke database Supabase yang sama
    const SUPABASE_URL = "https://zrycfquuqcygftngkwku.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_D7uzajVgAFW_8EC5hQp57g_IBiyAHYO"; 
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let player1;
    let currentVideoId1 = 'bRNlrdfKNd4'; // Video default jika database kosong
    
    const SECRET_PASSWORD = "12345678";

    function verifyPassword() {
        const inputPass = document.getElementById('pagePassword').value;
        if (inputPass === SECRET_PASSWORD) {
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            initializeApplication();
        } else {
            alert('Password salah! Akses ditolak.');
            document.getElementById('pagePassword').value = '';
        }
    }

    function checkEnterKey(event) {
        if (event.key === "Enter") {
            verifyPassword();
        }
    }

    async function initializeApplication() {
        try {
            // HANYA MENGAMBIL DATA DARI PLAYER ID 1
            const res1 = await supabaseClient
                .from('video_settings')
                .select('video_id')
                .eq('id', 1)
                .maybeSingle();

            if (res1.data && res1.data.video_id && res1.data.video_id !== 'contoh') {
                currentVideoId1 = res1.data.video_id;
            }

        } catch (err) {
            console.log("Membaca konfigurasi sinkronisasi cloud terhambat:", err);
        } finally {
            if (typeof YT !== 'undefined' && YT.loaded) {
                onYouTubeIframeAPIReady();
            }
        }

        // Realtime Sync khusus memantau perubahan Player ID 1 saja
        supabaseClient
            .channel('schema-db-changes')
            .on(
                'postgres_changes',
                { event: '*', schema: 'public', table: 'video_settings' },
                (payload) => {
                    if (payload.new && payload.new.id === 1) {
                        currentVideoId1 = payload.new.video_id;
                        setupSinglePlayer(currentVideoId1);
                    }
                }
            )
            .subscribe();
    }

    window.onload = function() {
        document.getElementById('pagePassword').focus();
    };

    function onYouTubeIframeAPIReady() {
        setupSinglePlayer(currentVideoId1);
    }

    function setupSinglePlayer(videoId) {
        if (!videoId) return;

        if (player1 && typeof player1.loadVideoById === 'function') {
            player1.loadVideoById({
                videoId: videoId,
                startSeconds: 0,
                suggestedQuality: 'hd1080'
            });
            setTimeout(() => {
                player1.mute();
                player1.setPlaybackQuality('hd1080');
                player1.playVideo();
            }, 500);
        } else {
            player1 = new YT.Player('player1', {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'loop': 1,
                    'playlist': videoId,
                    'mute': 1,          
                    'controls': 1,      
                    'rel': 0,
                    'modestbranding': 1,
                    'fs': 0,
                    'iv_load_policy': 3,
                    'vq': 'hd1080'
                },
                events: {
                    'onReady': (event) => {
                        event.target.mute();
                        event.target.setPlaybackQuality('hd1080');
                        event.target.playVideo();
                        setTimeout(() => {
                            if (event.target.getPlayerState() !== 1) event.target.playVideo();
                        }, 1000);
                    },
                    'onStateChange': (event) => {
                        if (event.data === YT.PlayerState.PLAYING) {
                            event.target.setPlaybackQuality('hd1080');
                        }
                        if (event.data === YT.PlayerState.ENDED) {
                            event.target.playVideo();
                        }
                    }
                }
            });
        }
    }
</script>

</body>
</html>
